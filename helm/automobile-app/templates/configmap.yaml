apiVersion: v1
kind: ConfigMap
metadata:
  name: autoforge-config
  namespace: {{ .Values.namespace }}
data:
  APP_NAME: {{ .Values.config.appName | quote }}
  APP_ENV: {{ .Values.config.appEnv | quote }}
  APP_VERSION: {{ .Values.config.appVersion | quote }}
  DB_HOST: {{ .Values.config.dbHost | quote }}
  DB_NAME: {{ .Values.config.dbName | quote }}
  DB_USER: {{ .Values.config.dbUser | quote }}
  FEATURE_FLAG_DARK_MODE: {{ .Values.config.featureFlagDarkMode | quote }}
