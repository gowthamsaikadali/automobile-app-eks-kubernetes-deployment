apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoforge
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "autoforge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: autoforge
  template:
    metadata:
      labels:
        app: autoforge
    spec:
      containers:
        - name: autoforge
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: autoforge-config
            - secretRef:
                name: autoforge-secret
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
