# dbUsername/dbPassword are intentionally NOT in values.yaml or values-*.yaml —
# they're passed at deploy time via --set from GitHub Actions secrets, so no
# real credential ever gets committed to Git.
apiVersion: v1
kind: Secret
metadata:
  name: autoforge-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  DB_USERNAME: {{ .Values.dbUsername | quote }}
  DB_PASSWORD: {{ .Values.dbPassword | quote }}
