name: Build and Deploy AutoForge

on:
  push:
    branches:
      - dev
      - main
    paths-ignore:
      - '**.md'

permissions:
  id-token: write   # required for OIDC — this is what replaces static AWS keys
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: automobile-app
  EKS_CLUSTER: autoforge-eks
  # From `terraform output github_actions_role_arn` after the first apply —
  # paste it here once, it doesn't change afterward.
  GHA_ROLE_ARN: arn:aws:iam::<ACCOUNT_ID>:role/autoforge-eks-github-actions

jobs:
  terraform:
    if: contains(github.event.head_commit.modified, 'terraform/')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init
      - run: terraform apply -auto-approve
        env:
          TF_VAR_dev_db_username:  ${{ secrets.DEV_DB_USERNAME }}
          TF_VAR_dev_db_password:  ${{ secrets.DEV_DB_PASSWORD }}
          TF_VAR_prod_db_username: ${{ secrets.PROD_DB_USERNAME }}
          TF_VAR_prod_db_password: ${{ secrets.PROD_DB_PASSWORD }}

  build-test-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        working-directory: app
        run: |
          pip install -r requirements.txt
          pytest

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$TAG .
          docker push $REGISTRY/$ECR_REPOSITORY:$TAG

  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    needs: build-test-push
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

      - name: Helm upgrade (dev)
        run: |
          helm upgrade --install autoforge ./helm/autoforge \
            -f helm/autoforge/values-dev.yaml \
            --set image.tag=${{ needs.build-test-push.outputs.image_tag }} \
            --set dbUsername=${{ secrets.DEV_DB_USERNAME }} \
            --set dbPassword=${{ secrets.DEV_DB_PASSWORD }}

      - run: kubectl rollout status deployment/autoforge -n dev --timeout=120s

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    needs: build-test-push
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

      - name: Helm upgrade (prod)
        run: |
          helm upgrade --install autoforge ./helm/autoforge \
            -f helm/autoforge/values-prod.yaml \
            --set image.tag=${{ needs.build-test-push.outputs.image_tag }} \
            --set dbUsername=${{ secrets.PROD_DB_USERNAME }} \
            --set dbPassword=${{ secrets.PROD_DB_PASSWORD }}

      - run: kubectl rollout status deployment/autoforge -n prod --timeout=180s
