# DO NOT commit real secrets to git. This file uses a placeholder value.
# Generate the real one locally with:
#   kubectl create secret generic autoforge-secret --dry-run=client -o yaml \
#     --from-literal=DB_PASSWORD='YourStrongPassword123!' -n dev
apiVersion: v1
kind: Secret
metadata:
  name: autoforge-secret
  namespace: prod
type: Opaque
stringData:
  DB_PASSWORD: "ChangeMe-Prod-Password456!"
