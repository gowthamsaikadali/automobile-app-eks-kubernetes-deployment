# Requires the AWS Load Balancer Controller to be installed on the cluster
# (see docs/aws-load-balancer-controller.md). If you skip that controller,
# use service-loadbalancer.yaml instead to reach the app.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: autoforge-ingress
  namespace: prod
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: autoforge-clusterip
                port:
                  number: 80
