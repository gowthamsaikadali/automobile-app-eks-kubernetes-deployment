apiVersion: v1
kind: ConfigMap
metadata:
  name: autoforge-config
  namespace: prod
data:
  APP_NAME: "AutoForge Dashboard"
  APP_ENV: "prod"
  APP_VERSION: "1.0.0"
  DB_HOST: "autoforge-db.prod.svc.cluster.local"
  DB_NAME: "autoforge_prod"
  DB_USER: "autoforge_user"
  FEATURE_FLAG_DARK_MODE: "true"
