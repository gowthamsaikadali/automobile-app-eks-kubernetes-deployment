# DO NOT commit real secrets to git. This file uses a placeholder value.
# Generate the real one locally with the SAME password you set in
# terraform/terraform.tfvars (db_password), e.g.:
#   kubectl create secret generic autoforge-secret --dry-run=client -o yaml \
#     --from-literal=DB_PASSWORD='YourStrongPassword123!' -n dev | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: autoforge-secret
  namespace: dev
type: Opaque
stringData:
  DB_PASSWORD: "REPLACE_WITH_YOUR_TERRAFORM_DB_PASSWORD"
