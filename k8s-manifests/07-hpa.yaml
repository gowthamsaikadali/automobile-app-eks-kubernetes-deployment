apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: autoforge-hpa
  namespace: dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autoforge
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70    # scale up once average pod CPU exceeds 70% of its request
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120   # wait 2 min of sustained low usage before scaling down
    scaleUp:
      stabilizationWindowSeconds: 0     # scale up immediately, no hesitation
