# ClusterIP: only reachable from inside the cluster. This is what the
# Ingress will route to. Use this pattern by default — it's the most
# secure option since nothing outside the cluster can hit it directly.
apiVersion: v1
kind: Service
metadata:
  name: autoforge-clusterip
  namespace: dev
spec:
  type: ClusterIP
  selector:
    app: autoforge
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
