# type: LoadBalancer provisions a real AWS Network Load Balancer directly
# in front of this Service, bypassing Ingress entirely. Useful when you
# want to expose ONE service directly (e.g. a quick test, or a service
# that isn't HTTP). For a full app with path-based routing, TLS, and
# multiple services behind one address, prefer Ingress (Part 6) instead —
# don't run both patterns for the same app, pick one. Included here so
# you can see and compare both approaches.
apiVersion: v1
kind: Service
metadata:
  name: autoforge-lb
  namespace: dev
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: autoforge
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
