# IMPORTANT: never commit real secret values to Git, even base64-encoded —
# base64 is encoding, not encryption, anyone can decode it instantly.
#
# This file is a TEMPLATE showing the shape of the object. In practice,
# generate it imperatively so the real values never touch your repo:
#
#   kubectl create secret generic autoforge-secret \
#     --namespace=dev \
#     --from-literal=DB_USERNAME=admin \
#     --from-literal=DB_PASSWORD='<real-password>' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# In the CI/CD pipeline, these values come from GitHub Actions encrypted
# secrets (Settings > Secrets and variables > Actions), never hardcoded.

apiVersion: v1
kind: Secret
metadata:
  name: autoforge-secret
  namespace: dev
type: Opaque
stringData:
  DB_USERNAME: "REPLACE_ME"
  DB_PASSWORD: "REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: autoforge-secret
  namespace: prod
type: Opaque
stringData:
  DB_USERNAME: "REPLACE_ME"
  DB_PASSWORD: "REPLACE_ME"
